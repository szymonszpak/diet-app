version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dietbuilder-db
    environment:
      POSTGRES_USER: dietuser
      POSTGRES_PASSWORD: dietpassword
      POSTGRES_DB: dietbuilder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: